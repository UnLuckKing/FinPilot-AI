services:
  finpilot-autotrader:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4310
      DATABASE_URL: file:/app/data/finpilot.db
      ALLOW_LOCAL_PAPER_NO_AUTH: "false"
    ports:
      - "127.0.0.1:4310:4310"
    volumes:
      - finpilot_data:/app/data
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4310/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

volumes:
  finpilot_data:
