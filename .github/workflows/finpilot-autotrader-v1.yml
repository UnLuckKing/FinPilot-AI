name: FinPilot AutoTrader v1

on:
  push:
    paths:
      - "finpilot-autotrader-v1/**"
      - ".github/workflows/finpilot-autotrader-v1.yml"
  pull_request:
    paths:
      - "finpilot-autotrader-v1/**"
      - ".github/workflows/finpilot-autotrader-v1.yml"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: finpilot-autotrader-v1
    env:
      DATABASE_URL: file:../data/ci.db
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: finpilot-autotrader-v1/package-lock.json
      - run: npm ci
      - run: npm run db:generate
      - run: npm test
      - run: npm run typecheck
      - run: npm run check:pine
      - run: npm run simulate
      - run: npm run build
