name: FinPilot TradingView Extension CI

on:
  push:
    paths:
      - "finpilot-tradingview-extension/**"
      - ".github/workflows/tradingview-extension.yml"
  pull_request:
    paths:
      - "finpilot-tradingview-extension/**"
      - ".github/workflows/tradingview-extension.yml"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: finpilot-tradingview-extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: finpilot-tradingview-extension/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npm run check
      - run: npm audit --omit=dev
